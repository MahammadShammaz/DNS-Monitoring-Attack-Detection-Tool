<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS Monitor & Attack Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-link.active { background: rgba(255,255,255,0.1) !important; border-radius: 4px; }
        .stat-card { border-left: 4px solid; }
        .stat-card.blue  { border-color: #0d6efd; }
        .stat-card.red   { border-color: #dc3545; }
        .stat-card.yellow{ border-color: #ffc107; }
        .stat-card.green { border-color: #198754; }
    </style>
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-3">
    <span class="navbar-brand fw-bold">🛡 DNS Monitor & Attack Detection</span>
    <div class="d-flex gap-2">
        <a href="/"        class="nav-link text-light {% if request.path == '/' %}active{% endif %}">📊 Dashboard</a>
        <a href="/spoofing" class="nav-link text-light {% if request.path == '/spoofing' %}active{% endif %}">⚠ Spoofing</a>
        <a href="/config"  class="nav-link text-light {% if request.path == '/config' %}active{% endif %}">⚙ Config</a>
        <a href="/analysis" class="nav-link text-light {% if request.path == '/analysis' %}active{% endif %}">🔍 Analysis</a>
        <a href="/network" class="nav-link text-light {% if request.path == '/network' %}active{% endif %}">🌐 Network</a>
    </div>
</nav>

<div class="container-fluid mt-3 px-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
